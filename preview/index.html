<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>阿比盖尔之花 · 预览控制台</title>
    <link rel="stylesheet" href="./preview.css" />
  </head>
  <body>
    <main class="scene">
      <div class="scene__glow scene__glow--left"></div>
      <div class="scene__glow scene__glow--right"></div>

      <section class="stage">
        <aside class="stage__note">
          <p class="stage__eyebrow">预览控制</p>
          <h1>阿比盖尔之花</h1>
          <p class="stage__copy">
            这里是网页预览的控制台，不属于 app 本体。它会直接读取仓库里的真实文案库和权重，
            用来模拟当前日期、切换倒计时页，并验证卡片的交互和层级。
          </p>
          <div class="stage__meta">
            <span id="tagline-count">副标题读取中</span>
            <span id="egg-count">彩蛋读取中</span>
            <span id="tone-label">主题读取中</span>
          </div>

          <section class="preview-controls" aria-label="预览控制台">
            <div class="preview-controls__head">
              <div>
                <p class="preview-controls__eyebrow">预览时间</p>
                <h2>控制当前预览</h2>
              </div>
              <button class="preview-controls__today" id="jump-today" type="button">回到今天</button>
            </div>

            <label class="preview-controls__field" for="sim-date">
              <span>当前日期</span>
              <input id="sim-date" type="date" />
            </label>

            <div class="preview-controls__stepper">
              <button class="preview-chip-button" type="button" data-shift-days="-7">-7 天</button>
              <button class="preview-chip-button" type="button" data-shift-days="-1">前一天</button>
              <button class="preview-chip-button" type="button" data-shift-days="1">后一天</button>
              <button class="preview-chip-button" type="button" data-shift-days="7">+7 天</button>
            </div>

            <div class="preview-controls__quick">
              <button class="preview-chip-button" type="button" data-jump="target">目标当天</button>
              <button class="preview-chip-button" type="button" data-jump="minus30">前 30 天</button>
              <button class="preview-chip-button" type="button" data-jump="minus10">前 10 天</button>
              <button class="preview-chip-button" type="button" data-jump="month-start">目标月月初</button>
            </div>

            <div class="preview-controls__summary">
              <p id="sim-date-label">模拟日期：2026.03.24 周二</p>
              <p id="sim-target-label">当前倒计时：距离 8.31 · 2026.08.31</p>
            </div>

            <p class="preview-controls__status" id="source-status">正在读取仓库中的真实文案库…</p>
          </section>
        </aside>

        <section class="preview-card-shell" aria-label="倒计时卡片预览">
          <div class="preview-card">
            <img
              class="preview-card__watermark"
              src="../App/Resources/Defaults/icons/abigail_flower_level3.png"
              alt=""
            />

            <section class="preview-card__hero">
              <section class="preview-card__countdown" id="countdown-block">
                <div class="preview-card__head">
                  <div class="page-switcher" id="page-switcher" aria-label="倒计时切换"></div>
                  <p class="preview-card__title preview-card__title--count" id="card-title">距离 8.31</p>
                </div>
                <div class="preview-card__count-display" id="count-display">
                  <div class="preview-card__countline">
                    <span class="preview-card__days" id="days-number">160</span>
                    <span class="preview-card__unit">天</span>
                  </div>
                </div>
              </section>

              <div class="preview-card__utility">
                <button
                  class="preview-card__badge-button"
                  id="current-badge-button"
                  type="button"
                  aria-label="显示当前日期，双击可编辑倒计时"
                  title="双击编辑倒计时"
                >
                  <div class="preview-card__badge" id="current-badge" aria-hidden="true">
                    <span class="preview-card__badge-year" id="current-badge-year">2026</span>
                    <span class="preview-card__badge-date" id="current-badge-date">08.31</span>
                    <span class="preview-card__badge-weekday" id="current-badge-weekday">周一</span>
                  </div>
                </button>
              </div>
            </section>

            <section class="quote-panel">
              <div class="quote-panel__content">
                <div class="quote-panel__body" id="quote-panel"></div>
                <div class="quote-panel__footer" id="quote-footer"></div>
              </div>
              <span class="quote-panel__divider" aria-hidden="true"></span>
              <button
                class="flower-button flower-button--embedded"
                id="reroll-button"
                type="button"
                aria-label="换一句"
                title="换一句"
              >
                <img src="../App/Resources/Defaults/icons/abigail_flower_level3.png" alt="阿比盖尔之花" />
              </button>
            </section>
          </div>

          <div class="page-editor" id="page-editor" hidden>
            <button class="page-editor__scrim" id="page-editor-scrim" type="button" aria-label="关闭"></button>
            <form class="page-editor__panel" id="page-editor-form">
              <div class="page-editor__head">
                <div>
                  <p class="page-editor__eyebrow" id="page-editor-eyebrow">编辑倒计时</p>
                  <h3 id="page-editor-title">修改标签和目标日期</h3>
                </div>
                <button class="page-editor__close" id="page-editor-close" type="button" aria-label="关闭">×</button>
              </div>

              <label class="page-editor__field" for="page-title-input">
                <span>标签</span>
                <input id="page-title-input" type="text" maxlength="18" placeholder="给日期起个名字" />
              </label>

              <label class="page-editor__field" for="page-date-text-input">
                <span>日期</span>
                <div class="page-editor__date-row">
                  <input id="page-date-text-input" type="text" inputmode="numeric" placeholder="2026-08-31" />
                  <button class="page-editor__picker-button" id="page-date-picker-button" type="button">选日期</button>
                  <input id="page-date-picker-input" class="page-editor__picker-native" type="date" tabindex="-1" aria-hidden="true" />
                </div>
                <p class="page-editor__hint" id="page-date-hint">可直接输入 20260831、2026-08-31；右侧可点选日期</p>
              </label>

              <div class="page-editor__actions">
                <button class="page-editor__button" id="page-new-button" type="button">新建页</button>
                <button class="page-editor__button page-editor__button--danger" id="page-delete-button" type="button">删除</button>
                <div class="page-editor__actions-right">
                  <button class="page-editor__button" id="page-cancel-button" type="button">取消</button>
                  <button class="page-editor__button page-editor__button--primary" type="submit">保存</button>
                </div>
              </div>
            </form>
          </div>

          <div class="page-overview" id="page-overview" hidden>
            <button class="page-overview__scrim" id="page-overview-scrim" type="button" aria-label="关闭"></button>
            <section class="page-overview__panel" aria-label="倒计时总览">
              <div class="page-overview__head">
                <div>
                  <p class="page-overview__eyebrow">倒计时总览</p>
                  <h3>切换、找回和整理你的倒计时</h3>
                </div>
                <button class="page-overview__close" id="page-overview-close" type="button" aria-label="关闭">×</button>
              </div>

              <div class="page-overview__list" id="page-overview-list"></div>

              <div class="page-overview__actions">
                <button class="page-editor__button" id="page-overview-new-button" type="button">新建页</button>
                <div class="page-editor__actions-right">
                  <button class="page-editor__button page-editor__button--primary" id="page-overview-done-button" type="button">关闭</button>
                </div>
              </div>
            </section>
          </div>
        </section>

        <div class="detached-card-layer" id="detached-card-layer" aria-hidden="true"></div>
      </section>
    </main>

    <script src="./preview.js"></script>
  </body>
</html>
